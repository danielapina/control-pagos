<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Pagos de Clientes</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #ffffff; --bg-secondary: #f8f9fa; --bg-tertiary: #f1f3f5;
  --text-primary: #212529; --text-secondary: #6c757d;
  --border: #dee2e6; --border-secondary: #ced4da;
  --green: #1D9E75; --green-bg: #E1F5EE; --green-dark: #085041;
  --orange: #D85A30; --orange-bg: #FAECE7; --orange-dark: #4A1B0C;
  --amber-bg: #FAEEDA; --amber-dark: #633806;
  --radius-md: 8px; --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1a1a1a; --bg-secondary: #2a2a2a; --bg-tertiary: #333;
    --text-primary: #f0f0f0; --text-secondary: #aaa;
    --border: #444; --border-secondary: #555;
    --green-bg: #0a3328; --green-dark: #74C69D;
    --orange-bg: #3a1a0a; --orange-dark: #F0997B;
    --amber-bg: #3a2a0a; --amber-dark: #FAC775;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; }
.container { max-width: 980px; margin: 0 auto; padding: 24px 16px; }
.auth-bar { display: flex; align-items: center; justify-content: space-between; background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 16px; margin-bottom: 16px; font-size: 13px; flex-wrap: wrap; gap: 8px; }
.auth-status { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
.auth-status.connected { color: var(--green); }
.auth-status i { font-size: 16px; }
.sync-info { font-size: 12px; color: var(--text-secondary); }
.auth-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; font-size: 13px; font-weight: 500; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); cursor: pointer; background: var(--bg-primary); color: var(--text-primary); }
.auth-btn:hover { background: var(--bg-secondary); }
.auth-btn.sign-in { background: #0078d4; color: #fff; border-color: #0078d4; }
.auth-btn.sign-in:hover { background: #006bbf; }
.header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
.header h1 { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.month-nav { display: flex; align-items: center; gap: 6px; }
.month-nav button { background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 7px 11px; cursor: pointer; color: var(--text-primary); font-size: 14px; display: flex; align-items: center; }
.month-nav button:hover { background: var(--bg-secondary); }
.month-label { font-size: 15px; font-weight: 600; min-width: 150px; text-align: center; color: var(--text-primary); }
.add-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; font-size: 13px; font-weight: 500; background: var(--bg-primary); border: 1px solid var(--border-secondary); border-radius: var(--radius-md); cursor: pointer; color: var(--text-primary); }
.add-btn:hover { background: var(--bg-secondary); }
.summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 14px 16px; }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.stat-value { font-size: 26px; font-weight: 600; color: var(--text-primary); }
.stat-paid { color: var(--green); }
.stat-pending { color: var(--orange); }
.search-bar { display: flex; align-items: center; gap: 8px; background: var(--bg-primary); border: 1px solid var(--border-secondary); border-radius: var(--radius-md); padding: 9px 12px; margin-bottom: 16px; }
.search-bar i.ti-search { color: var(--text-secondary); font-size: 16px; }
.search-bar input { flex: 1; border: none; outline: none; background: none; font-size: 14px; color: var(--text-primary); }
.search-bar button { background: none; border: none; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; padding: 4px; border-radius: 6px; }
.search-bar button:hover { background: var(--bg-secondary); color: var(--text-primary); }
.tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.tab { padding: 9px 18px; font-size: 14px; cursor: pointer; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.tab.active { color: var(--text-primary); border-bottom-color: var(--green); font-weight: 600; }
.tab:hover:not(.active) { color: var(--text-primary); }
.section { display: none; }
.section.active { display: block; }
.card { background: var(--bg-primary); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 500px; }
th { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); background: var(--bg-secondary); white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-primary); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg-secondary); }
.client-name { font-weight: 600; font-size: 14px; }
.client-detail { font-size: 11px; color: var(--text-secondary); margin-top: 2px; display: flex; align-items: center; gap: 3px; }
.amount { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
.periods { display: flex; flex-wrap: wrap; gap: 5px; }
.period-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.period-label-small { font-size: 9px; color: var(--text-secondary); font-weight: 500; }
.period-btn { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border-secondary); background: none; cursor: pointer; font-size: 11px; font-weight: 600; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
.period-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-bg); }
.period-btn.paid { background: var(--green); border-color: var(--green); color: #fff; }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 9px; border-radius: 99px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge-paid { background: var(--green-bg); color: var(--green-dark); }
.badge-partial { background: var(--amber-bg); color: var(--amber-dark); }
.badge-pending { background: var(--orange-bg); color: var(--orange-dark); }
.delete-btn { background: none; border: none; cursor: pointer; color: var(--text-secondary); padding: 5px; border-radius: 6px; display: flex; align-items: center; font-size: 16px; }
.delete-btn:hover { color: var(--orange); background: var(--orange-bg); }
.edit-btn { background: none; border: none; cursor: pointer; color: var(--text-secondary); padding: 5px; border-radius: 6px; display: flex; align-items: center; font-size: 16px; }
.edit-btn:hover { color: #0078d4; background: #e8f0fe; }
.action-btns { display: flex; gap: 2px; }
.empty { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
.empty i { font-size: 36px; display: block; margin-bottom: 10px; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg-primary); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 24px; width: 360px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; }
.field input, .field select { width: 100%; padding: 9px 12px; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); font-size: 14px; background: var(--bg-primary); color: var(--text-primary); outline: none; }
.field input:focus, .field select:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.btn-primary { padding: 9px 18px; background: var(--green); color: #fff; border: none; border-radius: var(--radius-md); cursor: pointer; font-size: 14px; font-weight: 600; }
.btn-primary:hover { background: #17845f; }
.btn-secondary { padding: 9px 18px; background: none; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); cursor: pointer; font-size: 14px; color: var(--text-primary); }
.btn-secondary:hover { background: var(--bg-secondary); }
.toast { position: fixed; bottom: 24px; right: 24px; padding: 10px 18px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; z-index: 200; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--green); color: #fff; }
.toast.error { background: var(--orange); color: #fff; }
.toast.info { background: var(--text-primary); color: var(--bg-primary); }
</style>
</head>
<body>

<div id="lockScreen" style="position:fixed;inset:0;background:#1B4332;display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#fff;border-radius:16px;padding:36px 32px;width:320px;max-width:90vw;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
    <div style="font-size:40px;margin-bottom:8px;">🔐</div>
    <h2 style="font-size:18px;font-weight:700;color:#1B4332;margin-bottom:4px;">Control de Pagos</h2>
    <p style="font-size:13px;color:#6c757d;margin-bottom:20px;">Ingresa la contraseña para continuar</p>
    <input type="password" id="pwdInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter')checkPwd()"
      style="width:100%;padding:10px 14px;border:1.5px solid #dee2e6;border-radius:8px;font-size:15px;outline:none;margin-bottom:10px;"/>
    <div id="pwdError" style="color:#D85A30;font-size:12px;margin-bottom:8px;display:none;">Contraseña incorrecta</div>
    <button onclick="checkPwd()"
      style="width:100%;padding:11px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;">
      Entrar
    </button>
  </div>
</div>

<div style="background:#f8f9fa;border-bottom:1px solid #dee2e6;padding:6px 16px;text-align:right;">
  <span id="syncStatus" class="sync-status"></span>
</div>
<style>
.sync-status { font-size:12px; }
.sync-status.ok { color:#1D9E75; }
.sync-status.warn { color:#D85A30; }
.sync-status.loading { color:#6c757d; }
</style>

<div class="container">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="sync-info" id="syncInfo"></span>
      <button class="auth-btn sign-in" id="authBtn" onclick="handleAuth()">
        <i class="ti ti-brand-windows"></i> Conectar con Microsoft
      </button>
    </div>
  </div>

  <div class="header">
    <h1><i class="ti ti-receipt" style="font-size:22px;color:#1D9E75;"></i> Control de Pagos</h1>
    <div class="controls">
      <div class="month-nav">
        <button onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
        <span class="month-label" id="monthLabel"></span>
        <button onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <button class="add-btn" onclick="openModal()"><i class="ti ti-plus"></i> Agregar cliente</button>
    </div>
  </div>

  <div class="summary-cards">
    <div class="stat-card"><div class="stat-label">Total cobrado del mes</div><div class="stat-value stat-paid" id="sumMoney">$0</div></div>
    <div class="stat-card"><div class="stat-label">Total clientes</div><div class="stat-value" id="sumTotal">0</div></div>
    <div class="stat-card"><div class="stat-label">Recibos pagados</div><div class="stat-value stat-paid" id="sumPaid">0</div></div>
    <div class="stat-card"><div class="stat-label">Recibos pendientes</div><div class="stat-value stat-pending" id="sumPending">0</div></div>
    <div class="stat-card"><div class="stat-label">% cobrado</div><div class="stat-value" id="sumPct">0%</div></div>
  </div>

  <div class="search-bar">
    <i class="ti ti-search"></i>
    <input type="text" id="searchInput" placeholder="Buscar cliente por nombre..." oninput="render()">
    <button id="searchClear" onclick="clearSearch()" style="display:none;"><i class="ti ti-x"></i></button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('mensual',this)"><i class="ti ti-calendar-month"></i> Mensual</div>
    <div class="tab" onclick="switchTab('quincenal',this)"><i class="ti ti-calendar-week"></i> Quincenal</div>
    <div class="tab" onclick="switchTab('semanal',this)"><i class="ti ti-calendar"></i> Semanal</div>
  </div>

  <div id="mensual" class="section active"><div class="card"><div class="table-wrap" id="table-mensual"></div></div></div>
  <div id="quincenal" class="section"><div class="card"><div class="table-wrap" id="table-quincenal"></div></div></div>
  <div id="semanal" class="section"><div class="card"><div class="table-wrap" id="table-semanal"></div></div></div>
</div>


<div class="modal-overlay" id="editModalOverlay">
  <div class="modal">
    <h2><i class="ti ti-pencil" style="vertical-align:-3px;margin-right:6px;color:#1D9E75;"></i>Editar cliente</h2>
    <input type="hidden" id="edit-id"/>
    <div class="field"><label>Nombre del cliente</label><input type="text" id="edit-name" placeholder="Ej: Juan García"/></div>
    <div class="field"><label>Frecuencia de pago</label>
      <select id="edit-freq">
        <option value="mensual">Mensual (1 recibo/mes)</option>
        <option value="quincenal">Quincenal (2 recibos/mes)</option>
        <option value="semanal">Semanal (4-5 recibos/mes)</option>
      </select>
    </div>
    <div class="field"><label>Monto del recibo ($)</label><input type="number" id="edit-amount" placeholder="Ej: 500"/></div>
    <div class="field"><label>Notas (opcional)</label><input type="text" id="edit-notes" placeholder="Ej: dirección, teléfono..."/></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeEditModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveEdit()">Guardar cambios</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2><i class="ti ti-user-plus" style="vertical-align:-3px;margin-right:6px;color:#1D9E75;"></i>Agregar cliente</h2>
    <div class="field"><label>Nombre del cliente</label><input type="text" id="inp-name" placeholder="Ej: Juan García"/></div>
    <div class="field"><label>Frecuencia de pago</label>
      <select id="inp-freq">
        <option value="mensual">Mensual (1 recibo/mes)</option>
        <option value="quincenal">Quincenal (2 recibos/mes)</option>
        <option value="semanal">Semanal (4-5 recibos/mes)</option>
      </select>
    </div>
    <div class="field"><label>Monto del recibo ($)</label><input type="number" id="inp-amount" placeholder="Ej: 500"/></div>
    <div class="field"><label>Notas (opcional)</label><input type="text" id="inp-notes" placeholder="Ej: dirección, teléfono..."/></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="addClient()">Agregar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
// ── Configuración ────────────────────────────────────────────────────────────
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbx8z_qgijwpb4zDw-dYh3OCWv_nKThNINDmfDn1XH-qu9FfNvN8VwPJGWySRB6teEqT/exec';
const ACCESS_PASSWORD = 'cobranza2024'; // Cambia esto por tu contraseña

// ── Pantalla de contraseña ───────────────────────────────────────────────────
function checkPwd() {
  const val = document.getElementById('pwdInput').value;
  if (val === ACCESS_PASSWORD) {
    document.getElementById('lockScreen').style.display = 'none';
    sessionStorage.setItem('auth', '1');
    loadData();
  } else {
    document.getElementById('pwdError').style.display = 'block';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

if (sessionStorage.getItem('auth') === '1') {
  document.getElementById('lockScreen').style.display = 'none';
}
setTimeout(() => {
  const i = document.getElementById('pwdInput');
  if (i) i.focus();
}, 100);

// ── Estado ───────────────────────────────────────────────────────────────────
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
let now = new Date(), curYear = now.getFullYear(), curMonth = now.getMonth();
let clients = [], nextId = 1, syncTimeout = null, isSaving = false;

// ── Google Sheets sync ───────────────────────────────────────────────────────
async function loadData() {
  showSyncStatus('Cargando datos...', 'loading');
  try {
    const resp = await fetch(SHEET_URL);
    const text = await resp.text();
    if (text && text !== '{}') {
      const d = JSON.parse(text);
      clients = d.clients || [];
      nextId  = d.nextId  || 1;
    } else {
      loadLocal();
    }
    render();
    showSyncStatus('Datos sincronizados ✓', 'ok');
    setTimeout(() => showSyncStatus('', ''), 3000);
  } catch(e) {
    loadLocal();
    render();
    showSyncStatus('Sin conexión — datos locales', 'warn');
  }
}

async function saveData() {
  saveLocal();
  if (isSaving) return;
  isSaving = true;
  showSyncStatus('Guardando...', 'loading');
  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      body: JSON.stringify({ clients, nextId }),
      headers: { 'Content-Type': 'text/plain' }
    });
    const t = new Date().toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
    showSyncStatus(`Guardado ${t} ✓`, 'ok');
    setTimeout(() => showSyncStatus('', ''), 3000);
  } catch(e) {
    showSyncStatus('Error al guardar — datos locales', 'warn');
  }
  isSaving = false;
}

function scheduleSave() {
  saveLocal();
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(() => saveData(), 1000);
}

function saveLocal() { try { localStorage.setItem('cpagos_v3', JSON.stringify({ clients, nextId })); } catch(e) {} }
function loadLocal() {
  try { const s = localStorage.getItem('cpagos_v3'); if (s) { const d = JSON.parse(s); clients = d.clients || []; nextId = d.nextId || 1; } } catch(e) {}
  if (!clients.length) { clients = []; nextId = 1; }
}

function showSyncStatus(msg, type) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.textContent = msg;
  el.className = 'sync-status ' + type;
}

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, type='info') {
  const t = document.getElementById('toast'); t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Lógica de pagos ──────────────────────────────────────────────────────────
function monthKey() { return `${curYear}-${String(curMonth+1).padStart(2,'0')}`; }

function periodsForMonth(freq) {
  if (freq==='mensual')   return [{ label:'Mes', key:'01' }];
  if (freq==='quincenal') return [{ label:'1ª quincena', key:'q1' },{ label:'2ª quincena', key:'q2' }];
  if (freq==='semanal') {
    // Cuenta los viernes reales del mes (cobro semanal = cada viernes)
    const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
    let fridays = 0;
    for (let day=1; day<=daysInMonth; day++) {
      if (new Date(curYear, curMonth, day).getDay() === 5) fridays++;
    }
    return Array.from({length: fridays}, (_,i) => ({ label:`Semana ${i+1} (viernes)`, key:`w${i+1}` }));
  }
  return [];
}

function isPaid(c, k) { const m=monthKey(); return !!(c.payments[m]&&c.payments[m][k]); }

function togglePay(id, k) {
  const c = clients.find(x=>x.id===id); if (!c) return;
  const m = monthKey(); if (!c.payments[m]) c.payments[m]={};
  c.payments[m][k] = !c.payments[m][k]; scheduleSave(); render();
}

function getStatus(c) {
  const p=periodsForMonth(c.freq), paid=p.filter(x=>isPaid(c,x.key)).length;
  return paid===0?'pending':paid===p.length?'paid':'partial';
}

function statusBadge(c) {
  const s=getStatus(c), p=periodsForMonth(c.freq), paid=p.filter(x=>isPaid(c,x.key)).length;
  if (s==='paid')    return `<span class="badge badge-paid"><i class="ti ti-check" style="font-size:11px;"></i> Al corriente</span>`;
  if (s==='partial') return `<span class="badge badge-partial">${paid}/${p.length} pagados</span>`;
  return `<span class="badge badge-pending"><i class="ti ti-clock" style="font-size:11px;"></i> Pendiente</span>`;
}

function visibleClients() {
  const mk = monthKey();
  const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  return clients.filter(c => {
    // Si el cliente fue eliminado, solo se oculta en el mes de eliminación en adelante.
    // Los meses anteriores a su eliminación siguen mostrándolo con su historial intacto.
    if (c.deletedAt && mk >= c.deletedAt) return false;
    if (q && !c.name.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderTable(freq, cid) {
  const list = visibleClients().filter(c=>c.freq===freq), el=document.getElementById(cid);
  document.getElementById('searchClear').style.display = document.getElementById('searchInput').value ? 'flex' : 'none';
  if (!list.length) { el.innerHTML=`<div class="empty"><i class="ti ti-users"></i>No hay clientes aquí.<br>Agrega uno con el botón de arriba.</div>`; return; }
  el.innerHTML = `<table><thead><tr><th>Cliente</th><th>Monto</th><th>Recibos — ${MONTHS[curMonth]} ${curYear}</th><th>Estado</th><th></th></tr></thead><tbody>${
    list.map(c => {
      const periods = periodsForMonth(c.freq);
      const btns = periods.map(p => {
        const paid = isPaid(c,p.key);
        return `<div class="period-wrap"><span class="period-label-small">${p.key.replace('q','Q').replace('w','S')}</span><button class="period-btn${paid?' paid':''}" onclick="togglePay(${c.id},'${p.key}')" title="${p.label}">${paid?'<i class="ti ti-check" style="font-size:13px;"></i>':''}</button></div>`;
      }).join('');
      const amt = c.amount ? `$${Number(c.amount).toLocaleString('es-MX')}` : '';
      return `<tr><td><div class="client-name">${c.name}</div>${c.notes?`<div class="client-detail"><i class="ti ti-note" style="font-size:11px;"></i> ${c.notes}</div>`:''}</td><td><span class="amount">${amt}</span></td><td><div class="periods">${btns}</div></td><td>${statusBadge(c)}</td><td><div class="action-btns"><button class="edit-btn" onclick="openEditModal(${c.id})" title="Editar"><i class="ti ti-pencil"></i></button><button class="delete-btn" onclick="deleteClient(${c.id})" title="Eliminar"><i class="ti ti-trash"></i></button></div></td></tr>`;
    }).join('')
  }</tbody></table>`;
}

function updateSummary() {
  let paid=0, total=0, money=0;
  const list = visibleClients();
  list.forEach(c => periodsForMonth(c.freq).forEach(p => {
    total++;
    if (isPaid(c,p.key)) { paid++; money += Number(c.amount)||0; }
  }));
  document.getElementById('sumTotal').textContent   = list.length;
  document.getElementById('sumPaid').textContent    = paid;
  document.getElementById('sumPending').textContent = total - paid;
  document.getElementById('sumPct').textContent     = total ? Math.round(paid/total*100)+'%' : '0%';
  document.getElementById('sumMoney').textContent   = `$${money.toLocaleString('es-MX')}`;
}

function render() {
  document.getElementById('monthLabel').textContent = `${MONTHS[curMonth]} ${curYear}`;
  renderTable('mensual','table-mensual');
  renderTable('quincenal','table-quincenal');
  renderTable('semanal','table-semanal');
  updateSummary();
}

function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active'); document.getElementById(id).classList.add('active');
}

function changeMonth(dir) {
  curMonth+=dir; if(curMonth>11){curMonth=0;curYear++;} if(curMonth<0){curMonth=11;curYear--;} render();
}

function openModal()  { document.getElementById('modalOverlay').classList.add('open'); document.getElementById('inp-name').focus(); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function addClient() {
  const name=document.getElementById('inp-name').value.trim(); if (!name) { document.getElementById('inp-name').focus(); return; }
  clients.push({ id:nextId++, name, freq:document.getElementById('inp-freq').value, amount:document.getElementById('inp-amount').value, notes:document.getElementById('inp-notes').value.trim(), payments:{} });
  scheduleSave();
  ['inp-name','inp-amount','inp-notes'].forEach(id=>document.getElementById(id).value='');
  closeModal();
  const freq = clients[clients.length-1].freq, tabMap={mensual:0,quincenal:1,semanal:2};
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab')[tabMap[freq]].classList.add('active');
  document.querySelectorAll('.section')[tabMap[freq]].classList.add('active');
  render();
  showToast('Cliente agregado', 'success');
}

function deleteClient(id) {
  if (!confirm('¿Eliminar este cliente? Su historial en meses anteriores se conservará, pero dejará de aparecer a partir de este mes.')) return;
  const c = clients.find(x=>x.id===id); if (!c) return;
  c.deletedAt = monthKey();
  scheduleSave(); render();
  showToast('Cliente eliminado', 'success');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  render();
}

document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target===document.getElementById('modalOverlay')) closeModal(); });
document.getElementById('editModalOverlay').addEventListener('click', e=>{ if(e.target===document.getElementById('editModalOverlay')) closeEditModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') { closeModal(); closeEditModal(); } });

function openEditModal(id) {
  const c = clients.find(x=>x.id===id); if (!c) return;
  document.getElementById('edit-id').value     = c.id;
  document.getElementById('edit-name').value   = c.name;
  document.getElementById('edit-freq').value   = c.freq;
  document.getElementById('edit-amount').value = c.amount;
  document.getElementById('edit-notes').value  = c.notes || '';
  document.getElementById('editModalOverlay').classList.add('open');
  document.getElementById('edit-name').focus();
}

function closeEditModal() {
  document.getElementById('editModalOverlay').classList.remove('open');
}

function saveEdit() {
  const id   = parseInt(document.getElementById('edit-id').value);
  const name = document.getElementById('edit-name').value.trim();
  if (!name) { document.getElementById('edit-name').focus(); return; }
  const c = clients.find(x=>x.id===id); if (!c) return;
  c.name   = name;
  c.freq   = document.getElementById('edit-freq').value;
  c.amount = document.getElementById('edit-amount').value;
  c.notes  = document.getElementById('edit-notes').value.trim();
  scheduleSave();
  closeEditModal();
  render();
  showToast('Cliente actualizado', 'success');
}

// Cargar datos solo si ya está autenticado
if (sessionStorage.getItem('auth') === '1') loadData();
</script>
</body>
</html>
